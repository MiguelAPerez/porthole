  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --hover: #1f242c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      line-height: 1.5;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--muted);
    }

    .search {
      max-width: 440px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .search input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .search input:focus {
      border-color: var(--accent);
    }

    .search-progress {
      max-width: 440px;
      margin: -1.5rem auto 1.5rem;
      height: 2px;
      background: transparent;
      overflow: hidden;
      border-radius: 1px;
    }

    .search-progress.active::after {
      content: '';
      display: block;
      height: 100%;
      width: 35%;
      background: var(--accent);
      border-radius: 1px;
      animation: locus-scan 1.2s ease-in-out infinite;
    }

    @keyframes locus-scan {
      0%   { transform: translateX(-200%); }
      100% { transform: translateX(400%); }
    }

    .refresh-btn {
      padding: 0.75rem 0.875rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .projects {
      max-width: 1200px;
      margin: 0 auto;
    }

    .category {
      margin-bottom: 2rem;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .category-header h2 {
      font-size: 1.25rem;
      color: var(--text);
    }

    .category-header .icon {
      font-size: 1.5rem;
    }

    .category-header .count {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    body:not(.scrolling) .project-card:hover {
      border-color: var(--accent);
    }

    .project-card .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .project-card .name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .project-card .desc {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .project-card .tech {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

        "readme": "\n# Act Runner Manager\n\nThis tool is used to manage Act Runners. It is a python script that uses the docker cli to build and run Act Runners.\n\n[![Build Status](https://build.miguelaperez.dev/api/badges/mperez/act_runner_manager/status.svg?ref=refs/heads/main)](https://build.miguelaperez.dev/mperez/act_runner_manager)\n\n## Architecture\n\n```tree\n|-- runners.json\n|-- build (generated)\n|   |-- runner1\n|   |   |-- Dockerfile\n|   |-- runner2\n|   |   |-- Dockerfile\n|-- dockerfile-template\n|-- manager.py (python script)\n|-- README.md\n```\n\n## Usage\n\nTo configure the Act Runners, edit the `runners.json` file.\n\n```json\n{\n    \"runners\": [\n        {\n            \"name\": \"runner1\",\n            \"image\": \"ubuntu:24.04\",\n            \"version\": \"1.0.0\",\n            \"labels\": \"label1,label2\",\n            \"command\": \"apt-get update && apt-get install -y curl ca-certificates && rm -rf /var/lib/apt/lists/*\",\n            \"env\": {\n                \"GITEA_INSTANCE\": \"https://gitea.com\",\n                \"GITEA_TOKEN\": \"$GITEA_TOKEN\",\n            }\n        }\n    ]\n}\n```\n\nCreate environment:\n\n```env\nGITEA_TOKEN=your_gitea_token\n```\n\nStart environment:\n\n```bash\npython3 -m venv venv\nsource venv/bin/activate\npip install -r requirements.txt\n```\n\nStart Act Runners:\n\n```bash\npython manager.py start\n```\n\nStop Act Runners:\n\n```bash\npython manager.py stop\n```\n\n## Testing\n\nTo run the configuration generation snapshot tests (requires `requirements-dev.txt` dependencies):\n\n```bash\npytest test_manager.py\n```\n\nIf you modify manager logic and intentionally change the configurations, you can update the stored snapshots with:\n\n```bash\npytest test_manager.py --snapshot-update\n```\n",

rez/locus:latest\n```\n\n### Build locally\n\n```bash\ncp .env.example .env\n",

or the components.\n- .env : Contains the environment variables for the components.\n- ",

        "readme": "---\nname: Pagination with SSG\nslug: pagination-with-ssg\ndescription: Learn to implement page based pagination with Next.js and Vercel.\nframework: Next.js\nuseCase: Documentation\ncss: Tailwind\ndeployUrl: https://vercel.com/new/clone?repository-url=https://github.com/vercel/examples/tree/main/solutions/pagination-with-ssg&project-name=pagination-with-ssg&repository-name=pagination-with-ssg\ndemoUrl: https://pagination-with-ssg.vercel.app\n---\n\n# Pagination with SSG\n\nThis example shows how to implement page based pagination with [SSG](https://nextjs.org/docs/basic-features/data-fetching/get-static-props) in Next.js.\n\n## Demo\n\nhttps://pagination-with-ssg.vercel.app\n\n## How it works\n\nThe first 5 paginated pages are cached in the edge at build time, and the rest are incrementally cached using [ISR](https://nextjs.org/docs/basic-features/data-fetching/incremental-static-regeneration), that way we can avoid increasing build times no matter how many pages we have while still keeping essential pages cached from the\nstart.\n\nThe example showcases a PLP (Product Listing Pages) where:\n\n- There are 100 test products and 1 category (PLP)\n- There are 10 results per page for a total of 10 pages, where 5 are pre-generated with `getStaticPaths`\n\n```ts\n// pages/category/[page].tsx\n\nexport const getStaticPaths = async () => {\n  return {\n    // Prerender the next 5 pages after the first page, which is handled by the index page.\n    // Other pages will be prerendered at runtime.\n    paths: Array.from({ length: 5 }).map((_, i) => `/category/${i + 2}`),\n    // Block the request for non-generated pages and cache them in the background\n    fallback: 'blocking',\n  }\n}\n```\n\n## How to Use\n\nYou can choose from one of the following two methods to use this repository:\n\n### One-Click Deploy\n\nDeploy the example using [Vercel](https://vercel.com?utm_source=github&utm_medium=readme&utm_campaign=vercel-examples):\n\n[![Deploy with Vercel](https://vercel.com/button)](https://vercel.com/new/clone?repository-url",

    const projectsContainer = document.getElementById('projects');
    const searchInput = document.getElementById('search');
    const searchProgress = document.getElementById('search-progress');

    const projectMap = {};
    for (const cat of Object.values(projects)) {
      for (const p of cat.projects) projectMap[p.name] = p;
    }

    function cardHTML(p) {
      return `<a class="project-card" href="${p.path}">
        <div class="icon">${p.icon}</div>
        <div class="name">${p.name}</div>
        <div class="desc">${p.description || 'No description'}</div>
        <div class="tech">${p.tech}</div>
      </a>`;
    }

    function renderProjects(filter = '') {
      const lc = filter.toLowerCase();
      let html = '';

      for (const category of Object.values(projects)) {
        const matched = filter
          ? category.projects.filter(p =>
              p.name.toLowerCase().includes(lc) ||
              p.tech.toLowerCase().includes(lc) ||
              (p.description && p.description.toLowerCase().includes(lc))
            )
          : category.projects;

        if (matched.length === 0) continue;

        html += `<div class="category">
          <div class="category-header">
            <span class="icon">${category.icon}</span>
            <h2>${category.tech}</h2>
            <span class="count">${matched.length} projects</span>
          </div>
          <div class="projects-grid">`;
        for (const p of matched) html += cardHTML(p);
        html += '</div></div>';
      }

      projectsContainer.innerHTML = html || '<div class="no-results">No projects found</div>';
    }

    function renderLocusResults(results) {
      const seen = new Map();
      for (const r of results) {
        const name = r.metadata && r.metadata.source;
        const p = name && projectMap[name];
        if (!p) continue;
        if (!seen.has(name) || r.score > seen.get(name).score) seen.set(name, { p, score: r.score });
      }

      if (seen.size === 0) {
        projectsContainer.innerHTML = '<div class="no-results">No projects found</div>';
        return;
      }

      let html = `<div class="category"><div class="category-header"><span class="icon">🔍</span><h2>Semantic results</h2><span class="count">${seen.size} projects</span></div><div class="projects-grid">`;
      for (const { p } of seen.values()) html += cardHTML(p);
      html += '</div></div>';
      projectsContainer.innerHTML = html;
    }

    renderProjects();

    let debounce;
    let currentQuery = '';

    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounce);
      const query = e.target.value.trim();
      currentQuery = query;

      if (!query) {
        searchProgress.classList.remove('active');
        renderProjects();
        return;
      }

      debounce = setTimeout(async () => {
        searchProgress.classList.add('active');
        try {
          const res = await fetch(
            `https://locus.miguelaperez.dev/spaces/projects/search?q=${encodeURIComponent(query)}&k=10`,
            { signal: AbortSignal.timeout(3000) }
          );
          if (!res.ok) throw new Error('non-ok');
          const data = await res.json();
          if (currentQuery !== query) return;
          searchProgress.classList.remove('active');
          renderLocusResults(data.results || []);
        } catch {
          if (currentQuery !== query) return;
          searchProgress.classList.remove('active');
          renderProjects(query);
        }
      }, 300);
    });

    let scrollTimer;
    window.addEventListener('scroll', () => {
      document.body.classList.add('scrolling');
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => document.body.classList.remove('scrolling'), 150);
    }, { passive: true });

    document.getElementById('refresh').addEventListener('click', async () => {
      const btn = document.getElementById('refresh');
      btn.textContent = '⏳';
      try {
        const res = await fetch('http://localhost:3131/refresh');
        if (res.ok) { btn.textContent = '✓'; setTimeout(() => location.reload(), 300); }
        else { btn.textContent = '✗'; setTimeout(() => { btn.innerHTML = '&#x21BB;'; }, 2000); }
      } catch {
        btn.textContent = '✗';
        setTimeout(() => { btn.innerHTML = '&#x21BB;'; }, 2000);
      }
    });
  </script>
