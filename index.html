  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --hover: #1f242c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      line-height: 1.5;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .header p {
      color: var(--muted);
    }

    .search {
      max-width: 440px;
      margin: 0 auto 2rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .search input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .search input:focus {
      border-color: var(--accent);
    }

    .refresh-btn {
      padding: 0.75rem 0.875rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }

    .refresh-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .projects {
      max-width: 1200px;
      margin: 0 auto;
    }

    .category {
      margin-bottom: 2rem;
    }

    .category-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
    }

    .category-header h2 {
      font-size: 1.25rem;
      color: var(--text);
    }

    .category-header .icon {
      font-size: 1.5rem;
    }

    .category-header .count {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.875rem;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    body:not(.scrolling) .project-card:hover {
      border-color: var(--accent);
    }

    .project-card .icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .project-card .name {
      font-weight: 600;
      font-size: 1.1rem;
      margin-bottom: 0.25rem;
    }

    .project-card .desc {
      color: var(--muted);
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .project-card .tech {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      grid-column: 1 / -1;
    }

    @media (max-width: 640px) {
      body {
        padding: 1rem;
      }

      .projects-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    const projectsContainer = document.getElementById('projects');
    const searchInput = document.getElementById('search');

    function renderProjects(filter = '') {
      const lc = filter.toLowerCase();
      let html = '';

      for (const category of Object.values(projects)) {
        const matched = filter
          ? category.projects.filter(p =>
              p.name.toLowerCase().includes(lc) ||
              p.tech.toLowerCase().includes(lc) ||
              (p.description && p.description.toLowerCase().includes(lc))
            )
          : category.projects;

        if (matched.length === 0) continue;

        html += `<div class="category">
          <div class="category-header">
            <span class="icon">${category.icon}</span>
            <h2>${category.tech}</h2>
            <span class="count">${matched.length} projects</span>
          </div>
          <div class="projects-grid">`;

        for (const p of matched) {
          html += `<a class="project-card" href="${p.path}">
            <div class="icon">${p.icon}</div>
            <div class="name">${p.name}</div>
            <div class="desc">${p.description || 'No description'}</div>
            <div class="tech">${p.tech}</div>
          </a>`;
        }

        html += '</div></div>';
      }

      projectsContainer.innerHTML = html || '<div class="no-results">No projects found</div>';
    }

    renderProjects();

    let debounce;
    searchInput.addEventListener('input', (e) => {
      clearTimeout(debounce);
      debounce = setTimeout(() => renderProjects(e.target.value), 150);
    });

    let scrollTimer;
    window.addEventListener('scroll', () => {
      document.body.classList.add('scrolling');
      clearTimeout(scrollTimer);
      scrollTimer = setTimeout(() => document.body.classList.remove('scrolling'), 150);
    }, { passive: true });

    document.getElementById('refresh').addEventListener('click', async () => {
      const btn = document.getElementById('refresh');
      btn.textContent = '⏳';
      try {
        const res = await fetch('http://localhost:3131/refresh');
        if (res.ok) { btn.textContent = '✓'; setTimeout(() => location.reload(), 300); }
        else { btn.textContent = '✗'; setTimeout(() => { btn.innerHTML = '&#x21BB;'; }, 2000); }
      } catch {
        btn.textContent = '✗';
        setTimeout(() => { btn.innerHTML = '&#x21BB;'; }, 2000);
      }
    });
