<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects Dashboard | Analytics</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="summary.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="dashboard-container">
    <div class="header">
      <h1><span class="icon">📊</span> Projects Dashboard</h1>
      <p>System overview and visual analytics</p>
    </div>

    <div id="loading">✨ Analyzing projects and Git repositories...</div>

    <div id="dashboardContent" class="hidden">
      <!-- Key Metrics -->
      <div class="metrics-row" id="metricsContainer">
        <div class="metric-card">
          <div class="value" id="totalProjects">0</div>
          <div class="label">Total Projects</div>
        </div>
        <div class="metric-card">
          <div class="value" id="activeStacks">0</div>
          <div class="label">Tech Stacks</div>
        </div>
        <div class="metric-card">
          <div class="value" id="recentPulse">0</div>
          <div class="label">Updated (7d)</div>
        </div>
        <div class="metric-card">
            <div class="value" id="gitHealth">0%</div>
            <div class="label">Git Health</div>
        </div>
      </div>

      <!-- Charts Section -->
      <div class="charts-grid">
        <div class="chart-container">
            <h3><span class="icon">🥧</span> Tech Distribution</h3>
            <canvas id="techChart"></canvas>
        </div>
        <div class="chart-container">
            <h3><span class="icon">📉</span> Activity Pulse</h3>
            <canvas id="activityChart"></canvas>
        </div>
      </div>

      <!-- Main Dashboard Grid -->
      <div class="dashboard-grid">
        <!-- Recent Activity -->
        <div class="section">
          <h2 class="section-title"><span class="icon">🕒</span> Recent Activity</h2>
          <div class="activity-list" id="recentActivity">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- System Pulse / Stats -->
        <div class="section">
          <h2 class="section-title"><span class="icon">⚡</span> System Pulse</h2>
          <div id="systemPulseContent">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>

      <!-- Detailed Breakdown -->
      <div class="tech-breakdown-full">
          <h2 class="section-title"><span class="icon">📁</span> Project Explorer</h2>
          <div id="explorerContainer">
              <!-- Populated by JS -->
          </div>
      </div>
    </div>

    <div class="nav-links">
      <a href="index.html">🔍 Search All Projects</a>
    </div>
  </div>

  <script src="summary.js"></script>
</body>
</html>
