<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects View</title>
  <style>
    :root {
      --bg: #0d1117;
      --card-bg: #161b22;
      --text: #c9d1d9;
      --muted: #8b949e;
      --border: #30363d;
      --accent: #58a6ff;
      --hover: #1f242c;
      --modal-bg: rgba(0, 0, 0, 0.7);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 2rem;
      line-height: 1.5;
    }

    .header {
      position: relative;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    .header h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .header p { color: var(--muted); }

    .settings-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    .settings-btn:hover { color: var(--text); }

    /* Modal Styles */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: var(--modal-bg);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--bg);
      padding: 2rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      width: 400px;
      max-width: 90%;
    }
    .modal-content h2 { margin-bottom: 1rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--muted); }
    .form-group input { 
      width: 100%; padding: 0.5rem; border-radius: 4px; border: 1px solid var(--border);
      background: var(--card-bg); color: var(--text);
    }
    .modal-actions { display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem; }
    .modal-actions button {
      padding: 0.5rem 1rem; border-radius: 4px; border: none; cursor: pointer;
    }
    .btn-secondary { background: var(--card-bg); color: var(--text); border: 1px solid var(--border); }
    .btn-primary { background: var(--accent); color: #fff; }

    .controls {
      max-width: 760px;
      margin: 0 auto 1.5rem;
    }

    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
    }

    .search-row input {
      flex: 1;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .search-row input:focus { border-color: var(--accent); }

    .refresh-btn {
      padding: 0.65rem 0.875rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card-bg);
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .pill {
      padding: 0.3rem 0.75rem;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }

    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.active { background: var(--card-bg); border-color: var(--accent); color: var(--accent); }

    .list {
      max-width: 760px;
      margin: 0 auto;
    }

    .project-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
    }

    body:not(.scrolling) .project-row:hover { background: var(--hover); }

    .project-row .icon { font-size: 1.1rem; flex-shrink: 0; width: 1.5rem; text-align: center; }

    .project-row .name {
      font-weight: 600;
      font-size: 0.95rem;
      white-space: nowrap;
      min-width: 160px;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .project-row .desc {
      flex: 1;
      color: var(--muted);
      font-size: 0.875rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .project-row .time {
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body { padding: 1rem; }
      .project-row .desc { display: none; }
      .project-row .name { max-width: none; flex: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📁 Projects</h1>
    <p>Browse through all your development projects &mdash; <a href="summary.html" style="color: var(--accent); text-decoration: none;">view summary</a></p>
    <button id="settingsBtn" class="settings-btn" title="Settings">⚙️</button>
  </div>

  <div class="controls">
    <div class="search-row">
      <input type="search" id="search" placeholder="Search projects...">
      <button id="refresh" class="refresh-btn" title="Regenerate projects (requires: node server.js)">&#x21BB;</button>
    </div>
    <div class="pills" id="pills">
      <button class="pill active" data-tech="">All</button>
    </div>
  </div>

  <div class="list" id="list"></div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal">
    <div class="modal-content">
      <h2>Settings</h2>
      <div class="form-group">
        <label for="locusUrl">Locus URL</label>
        <input type="text" id="locusUrl" placeholder="http://localhost:8000">
      </div>
      <div class="form-group">
        <label for="locusSpace">Locus Space</label>
        <input type="text" id="locusSpace" placeholder="projects">
      </div>
      <div class="modal-actions">
        <button id="closeSettings" class="btn-secondary">Cancel</button>
        <button id="saveSettings" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
